<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05080f"/>
      <stop offset="1" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="40%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="40%">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative grid -->
  <g opacity="0.15">
    <path d="M0 200 L1200 200 M0 400 L1200 400 M300 0 L300 630 M600 0 L600 630 M900 0 L900 630" stroke="#22d3ee" stroke-width="1"/>
  </g>

  <!-- Decorative circle -->
  <circle cx="980" cy="315" r="180" stroke="url(#stroke)" stroke-width="2" opacity="0.5"/>
  <circle cx="980" cy="315" r="120" stroke="url(#stroke)" stroke-width="2" opacity="0.7"/>
  <circle cx="980" cy="315" r="60" stroke="url(#stroke)" stroke-width="2"/>

  <!-- Healthcare cross -->
  <g transform="translate(940, 275)">
    <path d="M40 0 v80 M0 40 h80" stroke="url(#stroke)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="190" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="20" font-weight="600" letter-spacing="6">PUBLIC HEALTH PROFESSIONAL</text>

  <!-- Main title -->
  <text x="80" y="280" fill="#ffffff" font-family="system-ui, sans-serif" font-size="72" font-weight="700">Nishu Acharya</text>

  <!-- Subtitle -->
  <text x="80" y="340" fill="url(#stroke)" font-family="system-ui, sans-serif" font-size="36" font-weight="600">Healthcare Consultant</text>

  <!-- Description -->
  <text x="80" y="410" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">Research · Program Design · Implementation · Health Equity</text>

  <!-- Domain -->
  <text x="80" y="540" fill="#64748b" font-family="system-ui, sans-serif" font-size="18" letter-spacing="2">NISHUACHARYA.COM</text>

  <!-- Bottom line -->
  <line x1="80" y1="480" x2="400" y2="480" stroke="url(#stroke)" stroke-width="2"/>
</svg>
